<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 게임 만들기 워크숍</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  color: #333;
}
.header {
  text-align: center;
  padding: 40px 20px 20px;
  color: white;
}
.header h1 { font-size: 2.2em; margin-bottom: 8px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
.header p { font-size: 1.1em; opacity: 0.9; }
.kids-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
  max-width: 900px;
  margin: 30px auto;
  padding: 0 20px 60px;
}
.kid-card {
  background: white;
  border-radius: 20px;
  padding: 24px 16px;
  text-align: center;
  text-decoration: none;
  color: #333;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  cursor: pointer;
}
.kid-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}
.kid-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  margin: 0 auto 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2em;
  background: linear-gradient(135deg, #ffecd2, #fcb69f);
}
.kid-name { font-size: 1.1em; font-weight: 700; }
.kid-games { font-size: 0.85em; color: #888; margin-top: 4px; }
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: white;
  opacity: 0.8;
}
.empty-state .emoji { font-size: 4em; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="header">
  <h1>🎮 게임 만들기 워크숍</h1>
  <p>우리 아이들이 직접 만든 게임 모음!</p>
</div>
<div id="kids-container" class="kids-grid"></div>
<div id="empty-state" class="empty-state" style="display:none;">
  <div class="emoji">🚧</div>
  <p>아직 게임이 없어요!<br>곧 멋진 게임들이 추가될 거예요 ✨</p>
</div>
<script>
async function loadKids() {
  const container = document.getElementById('kids-container');
  const empty = document.getElementById('empty-state');
  try {
    const res = await fetch('/kids/index.json');
    if (!res.ok) throw new Error('not found');
    const kids = await res.json();
    if (kids.length === 0) {
      empty.style.display = 'block';
      return;
    }
    kids.forEach(kid => {
      const card = document.createElement('a');
      card.className = 'kid-card';
      card.href = `/kids/${encodeURIComponent(kid.slug)}/`;
      card.innerHTML = `
        <div class="kid-avatar">${kid.emoji || '🧒'}</div>
        <div class="kid-name">${kid.name}</div>
        <div class="kid-games">게임 ${kid.games}개</div>
      `;
      container.appendChild(card);
    });
  } catch {
    empty.style.display = 'block';
  }
}
loadKids();
</script>
</body>
</html>
