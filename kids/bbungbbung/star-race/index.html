<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>우주의 끝 — 지휘관 김뿅뿅</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a0a2e; font-family: 'Segoe UI', sans-serif; touch-action: none; }
canvas { display: block; }
#startScreen, #endScreen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 10; background: linear-gradient(135deg, #1a0a2e, #3d1a5e);
}
#startScreen.hidden, #endScreen.hidden { display: none; }
h1 { color: #ffb6c1; font-size: 2em; text-align: center; margin-bottom: 10px; text-shadow: 0 0 20px #ff69b4; }
h2 { color: #ffb6c1; font-size: 1.3em; text-align: center; margin-bottom: 5px; }
.dev { color: #dda0dd; font-size: 0.9em; margin-bottom: 20px; }
.subtitle { color: #e0b0ff; font-size: 1em; margin-bottom: 20px; text-align: center; padding: 0 20px; }
button {
  background: linear-gradient(135deg, #ff69b4, #ff1493);
  color: white; border: none; padding: 15px 40px; font-size: 1.2em;
  border-radius: 30px; cursor: pointer; box-shadow: 0 0 20px rgba(255,105,180,0.5);
}
button:hover { transform: scale(1.05); }
#hud {
  position: fixed; top: 10px; left: 10px; right: 10px; z-index: 5;
  display: flex; justify-content: space-between; color: #ffb6c1; font-size: 0.9em;
}
#progressBar {
  position: fixed; bottom: 0; left: 0; height: 4px; background: linear-gradient(90deg, #ff69b4, #ff1493, #ff69b4);
  z-index: 5; transition: width 0.3s;
}
</style>
</head>
<body>

<div id="startScreen">
  <h1>🌟 우주의 끝 🌟</h1>
  <h2>별똥별과의 경주</h2>
  <div class="dev">총괄 개발자: 김뿅뿅</div>
  <div class="subtitle">무지개 머리 강철 탐험가가 별똥별과 경주하며 우주의 끝을 향해 달려갑니다!</div>
  <button onclick="startGame()">🚀 출발!</button>
</div>

<div id="endScreen" class="hidden">
  <h1>🎉 우주의 끝 도착! 🎉</h1>
  <div class="subtitle">지휘관 김뿅뿅의 탐험가가 별똥별을 이기고 우주의 끝에 도달했습니다!</div>
  <div class="dev">총괄 개발자: 김뿅뿅</div>
  <button onclick="location.reload()">🔄 다시 출발!</button>
</div>

<div id="hud">
  <span id="distText">거리: 0%</span>
  <span id="starText">⭐ x 0</span>
</div>
<div id="progressBar" style="width:0%"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let running = false;
let distance = 0;
let stars = 0;
const GOAL = 100;
let player, shootingStars, collectibles, obstacles, bgStars, particles;

class Player {
  constructor() {
    this.x = W * 0.2;
    this.y = H * 0.5;
    this.vy = 0;
    this.size = 30;
    this.rainbowHue = 0;
    this.trail = [];
  }
  update() {
    this.vy += 0.3; // gravity
    this.y += this.vy;
    if (this.y < this.size) { this.y = this.size; this.vy = 0; }
    if (this.y > H - this.size) { this.y = H - this.size; this.vy = 0; }
    this.rainbowHue = (this.rainbowHue + 3) % 360;
    this.trail.push({ x: this.x, y: this.y, hue: this.rainbowHue, life: 15 });
    if (this.trail.length > 20) this.trail.shift();
  }
  draw() {
    // Trail
    this.trail.forEach((t, i) => {
      t.life--;
      if (t.life > 0) {
        ctx.beginPath();
        ctx.arc(t.x - (20 - i) * 2, t.y, this.size * 0.3 * (t.life / 15), 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${t.hue}, 100%, 70%, ${t.life / 15 * 0.5})`;
        ctx.fill();
      }
    });
    // Body (steel)
    // Iron Man style body
    ctx.save();
    ctx.translate(this.x, this.y);
    
    // Suit body
    const bodyGrad = ctx.createLinearGradient(-this.size, -this.size, this.size, this.size);
    bodyGrad.addColorStop(0, '#ff1493');
    bodyGrad.addColorStop(0.3, '#ff69b4');
    bodyGrad.addColorStop(0.6, '#c0c0c0');
    bodyGrad.addColorStop(1, '#808080');
    
    // Helmet shape
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size * 0.85, this.size, 0, 0, Math.PI * 2);
    ctx.fillStyle = bodyGrad;
    ctx.fill();
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // Faceplate (golden)
    ctx.beginPath();
    ctx.moveTo(-this.size * 0.5, -this.size * 0.1);
    ctx.lineTo(-this.size * 0.3, -this.size * 0.6);
    ctx.lineTo(0, -this.size * 0.75);
    ctx.lineTo(this.size * 0.3, -this.size * 0.6);
    ctx.lineTo(this.size * 0.5, -this.size * 0.1);
    ctx.lineTo(this.size * 0.35, this.size * 0.4);
    ctx.lineTo(-this.size * 0.35, this.size * 0.4);
    ctx.closePath();
    ctx.fillStyle = '#ffd700';
    ctx.fill();
    ctx.strokeStyle = '#daa520';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    
    // Eyes (glowing)
    const eyeGlow = 0.7 + Math.sin(Date.now() * 0.005) * 0.3;
    ctx.shadowBlur = 12;
    ctx.shadowColor = `rgba(135, 206, 250, ${eyeGlow})`;
    ctx.fillStyle = `rgba(135, 206, 250, ${eyeGlow})`;
    ctx.beginPath();
    ctx.ellipse(-this.size * 0.2, -this.size * 0.15, 5, 3.5, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(this.size * 0.2, -this.size * 0.15, 5, 3.5, 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Arc reactor (chest glow)
    const reactorGlow = 0.5 + Math.sin(Date.now() * 0.008) * 0.3;
    ctx.beginPath();
    ctx.arc(0, this.size * 0.15, 5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(135, 206, 250, ${reactorGlow})`;
    ctx.shadowBlur = 15;
    ctx.shadowColor = `rgba(135, 206, 250, ${reactorGlow})`;
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Inner reactor ring
    ctx.beginPath();
    ctx.arc(0, this.size * 0.15, 3, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.stroke();
    
    // Rainbow hair (Mohawk style on top!)
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      const spikeH = 8 + Math.sin(Date.now() * 0.01 + i) * 3;
      ctx.moveTo(-6 + i * 3, -this.size * 0.85);
      ctx.lineTo(-4 + i * 3, -this.size * 0.85 - spikeH);
      ctx.lineTo(-2 + i * 3, -this.size * 0.85);
      ctx.fillStyle = `hsl(${(this.rainbowHue + i * 60) % 360}, 100%, 65%)`;
      ctx.fill();
    }
    
    // Suit detail lines
    ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-this.size * 0.7, this.size * 0.3);
    ctx.lineTo(-this.size * 0.5, this.size * 0.7);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(this.size * 0.7, this.size * 0.3);
    ctx.lineTo(this.size * 0.5, this.size * 0.7);
    ctx.stroke();
    
    ctx.restore();
    
    // Repulsor beam trail (feet)
    if (this.vy < 0) {
      ctx.beginPath();
      ctx.moveTo(this.x - 5, this.y + this.size);
      ctx.lineTo(this.x, this.y + this.size + 15);
      ctx.lineTo(this.x + 5, this.y + this.size);
      ctx.fillStyle = `rgba(135, 206, 250, 0.6)`;
      ctx.shadowBlur = 10;
      ctx.shadowColor = 'rgba(135, 206, 250, 0.8)';
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
  flap() {
    this.vy = -7;
  }
}

class ShootingStar {
  constructor() {
    this.x = W + 50;
    this.y = Math.random() * H * 0.8 + H * 0.1;
    this.speed = 3 + Math.random() * 4;
    this.size = 10 + Math.random() * 10;
    this.trail = [];
  }
  update() {
    this.x -= this.speed;
    this.y += Math.sin(this.x * 0.01) * 0.5;
    this.trail.push({ x: this.x, y: this.y, life: 10 });
    if (this.trail.length > 8) this.trail.shift();
  }
  draw() {
    this.trail.forEach((t, i) => {
      t.life--;
      if (t.life > 0) {
        ctx.beginPath();
        ctx.arc(t.x + (8 - i) * 5, t.y, this.size * 0.3 * (t.life / 10), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 200, 100, ${t.life / 10 * 0.3})`;
        ctx.fill();
      }
    });
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
    g.addColorStop(0, '#fff8dc');
    g.addColorStop(0.5, '#ffd700');
    g.addColorStop(1, 'rgba(255, 215, 0, 0)');
    ctx.fillStyle = g;
    ctx.fill();
    // Face
    ctx.fillStyle = '#1a0a2e';
    ctx.beginPath(); ctx.arc(this.x - 3, this.y - 2, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(this.x + 3, this.y - 2, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(this.x, this.y + 2, 3, 0, Math.PI); ctx.stroke();
  }
  offScreen() { return this.x < -50; }
}

class Collectible {
  constructor() {
    this.x = W + Math.random() * W;
    this.y = Math.random() * (H - 60) + 30;
    this.size = 12;
    this.hue = Math.random() * 360;
    this.bob = Math.random() * Math.PI * 2;
  }
  update() {
    this.x -= 2;
    this.bob += 0.05;
  }
  draw() {
    const yy = this.y + Math.sin(this.bob) * 8;
    ctx.beginPath();
    // Star shape
    for (let i = 0; i < 5; i++) {
      const angle = (i * 72 - 90) * Math.PI / 180;
      const inner = (i * 72 - 90 + 36) * Math.PI / 180;
      ctx.lineTo(this.x + Math.cos(angle) * this.size, yy + Math.sin(angle) * this.size);
      ctx.lineTo(this.x + Math.cos(inner) * this.size * 0.5, yy + Math.sin(inner) * this.size * 0.5);
    }
    ctx.closePath();
    ctx.fillStyle = `hsl(${this.hue}, 100%, 75%)`;
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Glow
    ctx.beginPath();
    ctx.arc(this.x, yy, this.size + 5, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 100%, 75%, 0.2)`;
    ctx.fill();
  }
  offScreen() { return this.x < -20; }
}

class Obstacle {
  constructor() {
    this.x = W + Math.random() * W * 0.5;
    this.y = Math.random() * (H - 80) + 40;
    this.size = 15 + Math.random() * 10;
    this.speed = 2 + Math.random() * 2;
    this.angle = 0;
  }
  update() {
    this.x -= this.speed;
    this.y += Math.sin(this.x * 0.02) * 1.5;
    this.angle += 0.05;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    // Meteor rock
    ctx.beginPath();
    ctx.moveTo(0, -this.size);
    ctx.lineTo(this.size * 0.7, -this.size * 0.3);
    ctx.lineTo(this.size, this.size * 0.2);
    ctx.lineTo(this.size * 0.4, this.size);
    ctx.lineTo(-this.size * 0.3, this.size * 0.8);
    ctx.lineTo(-this.size, this.size * 0.1);
    ctx.lineTo(-this.size * 0.6, -this.size * 0.5);
    ctx.closePath();
    ctx.fillStyle = '#8B7355';
    ctx.fill();
    ctx.strokeStyle = '#A0926B';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Sparkle
    ctx.fillStyle = `rgba(255, 255, 200, ${0.3 + Math.sin(this.angle * 3) * 0.3})`;
    ctx.beginPath();
    ctx.arc(0, 0, this.size * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  offScreen() { return this.x < -30; }
}

function initBgStars() {
  bgStars = [];
  for (let i = 0; i < 100; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 2,
      speed: 0.2 + Math.random() * 0.8,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function drawBg() {
  // Pink-purple space gradient
  const g = ctx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, '#1a0a2e');
  g.addColorStop(0.5, '#2d1045');
  g.addColorStop(1, '#1a0a2e');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Background stars
  bgStars.forEach(s => {
    s.x -= s.speed;
    if (s.x < 0) { s.x = W; s.y = Math.random() * H; }
    s.twinkle += 0.03;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size * (0.7 + Math.sin(s.twinkle) * 0.3), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 182, 193, ${0.5 + Math.sin(s.twinkle) * 0.3})`;
    ctx.fill();
  });

  // Pink nebula blobs
  ctx.beginPath();
  ctx.arc(W * 0.7, H * 0.3, 100, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 105, 180, 0.03)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(W * 0.3, H * 0.7, 80, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(221, 160, 221, 0.03)';
  ctx.fill();
}

function spawnEntities() {
  if (Math.random() < 0.015) shootingStars.push(new ShootingStar());
  if (Math.random() < 0.02) collectibles.push(new Collectible());
  if (Math.random() < 0.008) obstacles.push(new Obstacle());
}

function checkCollisions() {
  // Collect stars
  collectibles = collectibles.filter(c => {
    const dx = player.x - c.x;
    const dy = player.y - (c.y + Math.sin(c.bob) * 8);
    if (Math.sqrt(dx * dx + dy * dy) < player.size + c.size) {
      stars++;
      distance += 2;
      return false;
    }
    return true;
  });

  // Bounce off obstacles (not die!)
  obstacles.forEach(o => {
    const dx = player.x - o.x;
    const dy = player.y - o.y;
    if (Math.sqrt(dx * dx + dy * dy) < player.size + o.size) {
      player.vy = -5;
      player.x -= 10;
      distance = Math.max(0, distance - 1);
    }
  });
}

function updateHUD() {
  document.getElementById('distText').textContent = `거리: ${Math.floor(distance)}%`;
  document.getElementById('starText').textContent = `⭐ x ${stars}`;
  document.getElementById('progressBar').style.width = `${Math.min(100, distance / GOAL * 100)}%`;
}

let frameCount = 0;
function gameLoop() {
  if (!running) return;
  frameCount++;

  drawBg();

  distance += 0.1;

  spawnEntities();

  shootingStars.forEach(s => { s.update(); s.draw(); });
  shootingStars = shootingStars.filter(s => !s.offScreen());

  collectibles.forEach(c => { c.update(); c.draw(); });
  collectibles = collectibles.filter(c => !c.offScreen());

  obstacles.forEach(o => { o.update(); o.draw(); });
  obstacles = obstacles.filter(o => !o.offScreen());

  player.update();
  player.draw();

  checkCollisions();
  updateHUD();

  if (distance >= GOAL) {
    running = false;
    document.getElementById('endScreen').classList.remove('hidden');
    return;
  }

  requestAnimationFrame(gameLoop);
}

// Controls
function handleInput(e) {
  if (!running) return;
  e.preventDefault();
  player.flap();
}

document.addEventListener('keydown', e => { if (e.code === 'Space') handleInput(e); });
canvas.addEventListener('touchstart', handleInput);
canvas.addEventListener('mousedown', handleInput);

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  player = new Player();
  shootingStars = [];
  collectibles = [];
  obstacles = [];
  initBgStars();
  running = true;
  gameLoop();
}
</script>
</body>
</html>
